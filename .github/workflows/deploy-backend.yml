name: Deploy Backend to Cloud Functions

on:
  push:
    branches:
      - master
    paths:
      - 'apps/api/**'
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout del código
        uses: actions/checkout@v4

      - name: ⚙️ Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Instalar dependencias
        run: npm ci

      - name: 🛠️ Compilar Backend
        run: npm run build -w api

      - name: 🔐 Autenticar con Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}'

      - name: 🚀 Desplegar a Cloud Functions
        run: |
          npm install -g firebase-tools
          firebase deploy --only functions --project todo-task-824ef --force